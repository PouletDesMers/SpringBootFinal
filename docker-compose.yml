version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sprintbootfinal-db
    environment:
      POSTGRES_DB: sprintbootfinal_db
      POSTGRES_USER: sprintboot_user
      POSTGRES_PASSWORD: sprintboot_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
