services:
  # ==============================
  # PostgreSQL
  # ==============================
  postgres:
    image: postgres:16-alpine
    container_name: sprintbootfinal-db
    environment:
      POSTGRES_DB: sprintbootfinal_db
      POSTGRES_USER: sprintboot_user
      POSTGRES_PASSWORD: sprintboot_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprintboot_user -d sprintbootfinal_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==============================
  # Backend Spring Boot
  # ==============================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sprintbootfinal-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sprintbootfinal_db
      DB_USER: sprintboot_user
      DB_PASS: sprintboot_pass
      JWT_SECRET: MaSuperCleSecretePourJwtTokenAChangerEnProduction123456789
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ==============================
  # Frontend Angular
  # ==============================
  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
    container_name: sprintbootfinal-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
