spring.application.name=SprintBootFinal

# ==============================
# Configuration PostgreSQL (Docker)
# ==============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sprintbootfinal_db}
spring.datasource.username=${DB_USER:sprintboot_user}
spring.datasource.password=${DB_PASS:sprintboot_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET:MaSuperCleSecretePourJwtTokenAChangerEnProduction123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}
