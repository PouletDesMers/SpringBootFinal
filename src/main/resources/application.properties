spring.application.name=SprintBootFinal

# ==============================
# Configuration PostgreSQL (Docker)
# ==============================
spring.datasource.url=jdbc:postgresql://localhost:5432/sprintbootfinal_db
spring.datasource.username=sprintboot_user
spring.datasource.password=sprintboot_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
