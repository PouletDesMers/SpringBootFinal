<div class="auth-container">
  <div class="auth-card">
    <h1>Inscription</h1>
    <p class="subtitle">Creez votre compte</p>
    <div *ngIf="error" class="alert alert-error">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" required minlength="3" placeholder="Au moins 3 caracteres" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required email placeholder="exemple@email.com" />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required minlength="6" placeholder="Au moins 6 caracteres" />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="Repetez le mot de passe" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">S'inscrire</button>
    </form>
    <p class="auth-link">Deja un compte ? <a routerLink="/login">Se connecter</a></p>
  </div>
</div>
