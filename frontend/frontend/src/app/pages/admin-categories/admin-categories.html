<div class="container">
  <h1 class="page-title">Gestion des categories</h1>

  <div *ngIf="loading" class="loading">Chargement...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="add-form">
    <input type="text" [(ngModel)]="newCategoryName" placeholder="Nouvelle categorie" (keyup.enter)="addCategory()" />
    <button class="btn btn-primary" (click)="addCategory()">Ajouter</button>
  </div>

  <div class="table-container" *ngIf="categories.length > 0">
    <table>
      <thead>
        <tr><th>ID</th><th>Nom</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of categories">
          <td>{{ c.id }}</td>
          <td>{{ c.name }}</td>
          <td><button class="btn btn-danger btn-sm" (click)="deleteCategory(c.id)">Supprimer</button></td>
        </tr>
      </tbody>
    </table>
  </div>

  <p *ngIf="!loading && categories.length === 0">Aucune categorie.</p>
</div>
